name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Lint with ruff
        run: ruff check vps_fastsearch/

      - name: Type check with mypy
        run: mypy vps_fastsearch/ --strict --ignore-missing-imports

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=vps_fastsearch --cov-report=term-missing --cov-report=xml

      - name: Print coverage summary
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          line_rate = float(root.get('line-rate', 0))
          coverage_pct = line_rate * 100
          print(f'\\nCoverage Summary: {coverage_pct:.1f}%')
          "

      - name: Test import
        run: python -c "from vps_fastsearch import FastSearchClient, search, embed; print('Import OK')"

      - name: CLI smoke test
        run: |
          vps-fastsearch --version
          vps-fastsearch --help

  wheel-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Build wheel and install from it
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
          pip install dist/*.whl

      - name: Verify CLI works from wheel
        run: |
          vps-fastsearch --version
          vps-fastsearch --help

      - name: Verify import from wheel
        run: python -c "from vps_fastsearch import FastSearchClient, search, embed; print('Wheel import OK')"
